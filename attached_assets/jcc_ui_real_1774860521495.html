<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>铲铲攻略站 · S16 阵容排行</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8960C; --gold-light: #F5C842; --gold-pale: #FFF3C4;
  --dark: #0A0804; --ink: #14100A; --card: #1A1410;
  --border: rgba(200,150,12,0.28);
  --S: #FF6B35; --A: #F5A623; --B: #7ED321; --C: #4A90E2;
  --c1: #9E9E9E; --c2: #4CAF50; --c3: #2196F3; --c4: #9C27B0; --c5: #FFB300;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Serif SC', serif;
  background: var(--dark); color: #E8D9B0;
  min-height: 100vh;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(200,150,12,0.10) 0%, transparent 55%);
}

/* NAV */
header {
  position:sticky; top:0; z-index:100;
  background: rgba(10,8,4,0.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.nav-inner {
  max-width:1380px; margin:0 auto; padding:0 20px;
  display:flex; align-items:center; gap:24px; height:56px;
}
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
.logo-box {
  width:38px; height:38px; border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 0 14px rgba(200,150,12,0.35);
}
.logo-name { font-family:'ZCOOL XiaoWei',serif; font-size:18px; color:var(--gold-light); letter-spacing:2px; }
.logo-sub { font-size:10px; color:rgba(200,150,12,0.5); letter-spacing:3px; }
nav { display:flex; gap:2px; flex:1; }
nav a {
  padding:7px 14px; border-radius:7px; color:rgba(232,217,176,0.6);
  text-decoration:none; font-size:13px; transition:all 0.18s;
  border:1px solid transparent; white-space:nowrap;
}
nav a:hover { color:var(--gold-light); background:rgba(200,150,12,0.07); border-color:rgba(200,150,12,0.18); }
nav a.on { color:var(--gold-light); background:rgba(200,150,12,0.12); border-color:rgba(200,150,12,0.28); }
.search-box {
  display:flex; align-items:center;
  background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; overflow:hidden;
  flex-shrink:0;
}
.search-box input {
  background:none; border:none; outline:none; color:var(--gold-pale);
  font-size:13px; padding:8px 12px; width:180px; font-family:inherit;
}
.search-box input::placeholder { color:rgba(200,150,12,0.3); }
.search-box button {
  background:rgba(200,150,12,0.12); border:none; border-left:1px solid var(--border);
  color:var(--gold); padding:8px 12px; cursor:pointer; font-size:14px;
}
.s16-badge {
  padding:4px 10px; border-radius:20px; font-size:11px; letter-spacing:1px;
  background:linear-gradient(135deg,#6B0F0F,#3A0808); border:1px solid rgba(180,80,80,0.3);
  color:#FFBBBB; flex-shrink:0;
}

/* HERO */
.hero { padding:28px 20px 22px; border-bottom:1px solid var(--border); max-width:1380px; margin:0 auto; }
.hero-row { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; }
.hero-eyebrow { font-size:11px; letter-spacing:4px; color:rgba(200,150,12,0.6); margin-bottom:8px; }
.hero-title { font-family:'ZCOOL XiaoWei',serif; font-size:34px; color:var(--gold-light); letter-spacing:3px; line-height:1; }
.hero-title span { color:var(--gold-pale); }
.hero-desc { font-size:13px; color:rgba(232,217,176,0.45); margin-top:8px; }
.tier-pills { display:flex; gap:7px; flex-shrink:0; }
.tp { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.tp-S { background:rgba(255,107,53,0.12); border:1px solid rgba(255,107,53,0.38); color:var(--S); }
.tp-A { background:rgba(245,166,35,0.12); border:1px solid rgba(245,166,35,0.38); color:var(--A); }
.tp-B { background:rgba(126,211,33,0.12); border:1px solid rgba(126,211,33,0.38); color:var(--B); }
.tp-C { background:rgba(74,144,226,0.12); border:1px solid rgba(74,144,226,0.38); color:var(--C); }

/* FILTER */
.filter-wrap { max-width:1380px; margin:0 auto; padding:16px 20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-bottom:1px solid rgba(200,150,12,0.08); }
.filter-lbl { font-size:12px; color:rgba(200,150,12,0.55); }
.fb { padding:5px 12px; border-radius:6px; border:1px solid rgba(200,150,12,0.18); background:rgba(200,150,12,0.04); color:rgba(232,217,176,0.55); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.fb:hover, .fb.on { background:rgba(200,150,12,0.12); border-color:var(--gold); color:var(--gold-light); }
.fdiv { width:1px; height:20px; background:var(--border); }
.result-info { max-width:1380px; margin:0 auto; padding:12px 20px; font-size:12px; color:rgba(200,150,12,0.5); }
.result-info span { color:var(--gold); }

/* LAYOUT */
.layout { max-width:1380px; margin:0 auto; padding:0 20px 40px; display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }

/* CARD LIST */
.card-list { display:flex; flex-direction:column; gap:14px; }
.lineup-card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; cursor:pointer; transition:all 0.2s; position:relative;
}
.lineup-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity 0.2s; }
.lineup-card:hover { border-color:rgba(200,150,12,0.55); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,0.35); }
.lineup-card:hover::before { opacity:1; }
.card-S::before { background:linear-gradient(90deg,transparent,var(--S),transparent); }
.card-A::before { background:linear-gradient(90deg,transparent,var(--A),transparent); }
.card-B::before { background:linear-gradient(90deg,transparent,var(--B),transparent); }
.card-C::before { background:linear-gradient(90deg,transparent,var(--C),transparent); }

.card-head {
  display:flex; align-items:center; gap:12px; padding:14px 18px 12px;
  border-bottom:1px solid rgba(200,150,12,0.08);
}
.rank-badge { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.rank-1 { background:linear-gradient(135deg,#C8960C,#F5C842); color:#0D0A04; }
.rank-2 { background:linear-gradient(135deg,#777,#B0B0B0); color:#0D0A04; }
.rank-3 { background:linear-gradient(135deg,#7B3A10,#C07840); color:#FFF0E0; }
.rank-n { background:rgba(200,150,12,0.08); border:1px solid rgba(200,150,12,0.18); color:rgba(200,150,12,0.65); }

.tier-tag { padding:2px 9px; border-radius:4px; font-size:11px; font-weight:700; flex-shrink:0; }
.tag-S { background:rgba(255,107,53,0.18); border:1px solid rgba(255,107,53,0.38); color:var(--S); }
.tag-A { background:rgba(245,166,35,0.18); border:1px solid rgba(245,166,35,0.38); color:var(--A); }
.tag-B { background:rgba(126,211,33,0.18); border:1px solid rgba(126,211,33,0.38); color:var(--B); }
.tag-C { background:rgba(74,144,226,0.18); border:1px solid rgba(74,144,226,0.38); color:var(--C); }

.card-title-wrap { flex:1; min-width:0; }
.card-title { font-size:15px; font-weight:600; color:#EEE0B8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-subtitle { font-size:11px; color:rgba(200,150,12,0.5); margin-top:2px; }
.trait-img { width:28px; height:28px; border-radius:6px; object-fit:cover; flex-shrink:0; border:1px solid rgba(200,150,12,0.2); }
.card-stats { display:flex; gap:16px; flex-shrink:0; }
.stat { text-align:center; }
.stat-v { font-size:16px; font-weight:700; }
.stat-l { font-size:10px; color:rgba(200,150,12,0.5); margin-top:1px; }
.sv-win { color:var(--S); }
.sv-top4 { color:var(--gold-light); }
.sv-avg { color:var(--A); }

.card-body { padding:12px 18px 14px; }
.units-row { display:flex; gap:7px; flex-wrap:wrap; align-items:flex-end; }
.unit-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
.unit-av {
  width:44px; height:44px; border-radius:8px;
  border:2px solid; position:relative; overflow:hidden;
  transition:transform 0.15s;
  background:#0D0A04;
}
.unit-av:hover { transform:scale(1.1); }
.unit-av img { width:100%; height:100%; object-fit:cover; display:block; }
.unit-av.c1 { border-color:rgba(158,158,158,0.5); }
.unit-av.c2 { border-color:rgba(76,175,80,0.6); }
.unit-av.c3 { border-color:rgba(33,150,243,0.6); }
.unit-av.c4 { border-color:rgba(156,39,176,0.6); }
.unit-av.c5 { border-color:rgba(255,179,0,0.75); }
.unit-av.core { box-shadow:0 0 10px rgba(200,150,12,0.45); border-color:var(--gold) !important; }
.unit-av.star3::after {
  content:'★★★'; position:absolute; top:-1px; left:0; right:0;
  text-align:center; font-size:7px; color:var(--gold-light); letter-spacing:1px;
  background:rgba(0,0,0,0.5); line-height:14px;
}
.cost-dot {
  position:absolute; bottom:1px; right:2px;
  font-size:8px; font-weight:700; line-height:1;
  padding:1px 3px; border-radius:3px;
}
.cd1 { background:#555; color:#fff; }
.cd2 { background:#2E7D32; color:#fff; }
.cd3 { background:#1565C0; color:#fff; }
.cd4 { background:#6A1B9A; color:#fff; }
.cd5 { background:#E65100; color:#fff; }
.unit-name { font-size:10px; color:rgba(232,217,176,0.55); max-width:44px; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.unit-name.core-name { color:var(--gold); font-weight:600; }

.equip-strip { display:flex; gap:4px; margin-top:8px; }
.equip-ic { width:22px; height:22px; border-radius:4px; object-fit:cover; border:1px solid rgba(200,150,12,0.2); }
.equip-sep { width:1px; height:22px; background:var(--border); margin:0 4px; }

.card-foot {
  padding:10px 18px; border-top:1px solid rgba(200,150,12,0.07);
  display:flex; align-items:center; justify-content:space-between;
}
.level-info { font-size:11px; color:rgba(200,150,12,0.5); }
.level-info span { color:var(--gold); font-weight:600; }
.detail-btn {
  padding:5px 12px; border-radius:6px; font-size:11px;
  background:rgba(200,150,12,0.08); border:1px solid rgba(200,150,12,0.22);
  color:var(--gold); cursor:pointer; transition:all 0.15s; font-family:inherit;
}
.detail-btn:hover { background:rgba(200,150,12,0.18); border-color:var(--gold); }

/* SIDEBAR */
.sidebar { display:flex; flex-direction:column; gap:16px; position:sticky; top:72px; }
.side-panel { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.side-hd { padding:13px 16px; background:rgba(200,150,12,0.05); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.side-hd-title { font-family:'ZCOOL XiaoWei',serif; font-size:14px; color:var(--gold-light); letter-spacing:2px; }
.side-hd-sub { font-size:10px; color:rgba(200,150,12,0.45); }
.side-body { padding:14px 16px; }

/* DETAIL PANEL */
.detail-banner { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--border); background:linear-gradient(135deg,rgba(139,26,26,0.10),rgba(200,150,12,0.04)); }
.detail-av { width:58px; height:58px; border-radius:10px; border:2px solid var(--gold); overflow:hidden; flex-shrink:0; }
.detail-av img { width:100%; height:100%; object-fit:cover; }
.detail-name { font-size:16px; color:var(--gold-light); font-weight:600; }
.detail-sub { font-size:11px; color:rgba(200,150,12,0.55); margin-top:4px; }

.detail-sec { margin-bottom:14px; }
.sec-lbl { font-size:10px; letter-spacing:3px; color:rgba(200,150,12,0.5); margin-bottom:8px; }
.stat-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.sg-item { padding:8px 10px; border-radius:7px; background:rgba(200,150,12,0.05); border:1px solid rgba(200,150,12,0.1); }
.sg-val { font-size:18px; font-weight:700; color:var(--gold-light); }
.sg-lbl { font-size:10px; color:rgba(200,150,12,0.5); margin-top:2px; }
.equip-list { display:flex; flex-direction:column; gap:5px; }
.equip-row-item { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; background:rgba(200,150,12,0.04); border:1px solid rgba(200,150,12,0.1); cursor:pointer; transition:all 0.15s; }
.equip-row-item:hover { border-color:var(--gold); }
.equip-row-item img { width:24px; height:24px; border-radius:4px; }
.equip-row-item span { font-size:11px; color:rgba(232,217,176,0.7); }
.divider { height:1px; background:linear-gradient(90deg,transparent,rgba(200,150,12,0.3),transparent); margin:12px 0; }

/* SEARCH */
.search-inp-wrap { display:flex; align-items:center; background:rgba(0,0,0,0.25); border:1px solid rgba(200,150,12,0.22); border-radius:7px; margin-bottom:10px; }
.search-inp-wrap input { flex:1; background:none; border:none; outline:none; color:var(--gold-pale); font-size:13px; padding:9px 12px; font-family:inherit; }
.search-inp-wrap input::placeholder { color:rgba(200,150,12,0.28); }
.search-inp-wrap span { padding:9px 12px; color:rgba(200,150,12,0.45); }
.hot-tags { display:flex; flex-wrap:wrap; gap:5px; }
.ht { padding:3px 9px; border-radius:14px; font-size:11px; background:rgba(200,150,12,0.07); border:1px solid rgba(200,150,12,0.16); color:rgba(200,150,12,0.6); cursor:pointer; transition:all 0.15s; }
.ht:hover { color:var(--gold-light); border-color:var(--gold); }

/* QUICK NAV */
.qnav-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.qn { display:flex; align-items:center; gap:7px; padding:9px 10px; border-radius:7px; background:rgba(200,150,12,0.04); border:1px solid rgba(200,150,12,0.1); cursor:pointer; text-decoration:none; color:rgba(232,217,176,0.6); font-size:12px; transition:all 0.15s; }
.qn:hover { border-color:rgba(200,150,12,0.28); color:var(--gold-light); }
.qn.full { grid-column:1/-1; }
.qn-icon { font-size:16px; }

@media(max-width:1100px) { .layout { grid-template-columns:1fr; } .sidebar { display:none; } }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(200,150,12,0.18); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a class="logo" href="#">
      <div class="logo-box">♟</div>
      <div><div class="logo-name">铲铲攻略站</div><div class="logo-sub">JCC S16</div></div>
    </a>
    <nav>
      <a href="#" class="on">🏆 阵容排行</a>
      <a href="#">🦸 弈子排行</a>
      <a href="#">🔗 羁绊排行</a>
      <a href="#">💎 符文排行</a>
      <a href="#">⚔️ 装备库</a>
    </nav>
    <div class="search-box">
      <input type="text" placeholder="搜索弈子、羁绊、装备…" id="globalSearch">
      <button onclick="doSearch()">🔍</button>
    </div>
    <div class="s16-badge">S16 · 怀旧编年史</div>
  </div>
</header>

<div style="max-width:1380px;margin:0 auto">
  <div class="hero">
    <div class="hero-row">
      <div>
        <div class="hero-eyebrow">SEASON 16 · 英雄联盟传奇 · 实时数据</div>
        <div class="hero-title"><span>阵容</span>排行榜</div>
        <div class="hero-desc">数据更新: 2026-03-19 07:30 · 共 25 套阵容 · 基于高段位实际对局统计</div>
      </div>
      <div class="tier-pills">
        <div class="tp tp-S" onclick="filterTier('S')">S 神级</div>
        <div class="tp tp-A" onclick="filterTier('A')">A 强势</div>
        <div class="tp tp-B" onclick="filterTier('B')">B 稳健</div>
        <div class="tp tp-C" onclick="filterTier('C')">C 一般</div>
      </div>
    </div>
  </div>

  <div class="filter-wrap">
    <span class="filter-lbl">排序</span>
    <button class="fb on" onclick="setSort('pickRate_4','前四率')">前四率</button>
    <button class="fb" onclick="setSort('pickRate_1','胜率')">胜率</button>
    <button class="fb" onclick="setSort('avgRanking','平均名次')">平均名次</button>
    <div class="fdiv"></div>
    <span class="filter-lbl">Tier</span>
    <button class="fb on" id="tier-all" onclick="filterTier('all')">全部</button>
    <button class="fb" id="tier-S" onclick="filterTier('S')">S</button>
    <button class="fb" id="tier-A" onclick="filterTier('A')">A</button>
    <button class="fb" id="tier-B" onclick="filterTier('B')">B</button>
    <button class="fb" id="tier-C" onclick="filterTier('C')">C</button>
  </div>
  <div class="result-info" id="resultInfo">共 <span>25</span> 套阵容</div>
</div>

<div class="layout">
  <div>
    <div class="card-list" id="cardList"></div>
  </div>
  <div class="sidebar">
    <!-- SEARCH -->
    <div class="side-panel">
      <div class="side-hd"><div class="side-hd-title">🔍 关键词检索</div></div>
      <div class="side-body">
        <div class="search-inp-wrap">
          <input type="text" placeholder="输入弈子 / 装备名称…" id="sideSearch" oninput="sideSearchFn()">
          <span>⌕</span>
        </div>
        <div class="hot-tags" id="hotTags">
          <span class="ht" onclick="setSideSearch('薇恩')">薇恩</span>
          <span class="ht" onclick="setSideSearch('安妮')">安妮</span>
          <span class="ht" onclick="setSideSearch('德莱厄斯')">德莱厄斯</span>
          <span class="ht" onclick="setSideSearch('无尽之刃')">无尽之刃</span>
          <span class="ht" onclick="setSideSearch('千珏')">千珏</span>
          <span class="ht" onclick="setSideSearch('斯维因')">斯维因</span>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="side-panel" id="detailPanel">
      <div class="side-hd">
        <div class="side-hd-title">弈子详情</div>
        <div class="side-hd-sub">点击弈子头像查看</div>
      </div>
      <div id="detailContent">
        <div style="padding:24px 16px;text-align:center;color:rgba(200,150,12,0.35);font-size:13px;">
          点击任意弈子头像<br>查看详细数值
        </div>
      </div>
    </div>

    <!-- QUICK NAV -->
    <div class="side-panel">
      <div class="side-hd"><div class="side-hd-title">快速导航</div></div>
      <div class="side-body">
        <div class="qnav-grid">
          <a class="qn" href="#"><span class="qn-icon">🏆</span>阵容排行</a>
          <a class="qn" href="#"><span class="qn-icon">🦸</span>弈子排行</a>
          <a class="qn" href="#"><span class="qn-icon">🔗</span>羁绊排行</a>
          <a class="qn" href="#"><span class="qn-icon">💎</span>符文排行</a>
          <a class="qn full" href="#"><span class="qn-icon">⚔️</span>装备库 · 合成路线图</a>
        </div>
      </div>
    </div>
  </div>

let currentTier = 'all';
let currentSort = 'pickRate_4';
let currentAsc = false;

function getTier(row) {
  const p4 = row.pickRate_4, p1 = row.pickRate_1;
  if (p4 >= 60 || p1 >= 20) return 'S';
  if (p4 >= 50 || p1 >= 12) return 'A';
  if (p4 >= 38 || p1 >= 7) return 'B';
  return 'C';
}

function costClass(p) { return 'c' + Math.min(p, 5); }
function costDot(p) { return '<div class="cost-dot cd' + Math.min(p,5) + '">' + p + '</div>'; }

function renderCards(rows) {
  const list = document.getElementById('cardList');
  document.getElementById('resultInfo').innerHTML = '共 <span>' + rows.length + '</span> 套阵容';
  list.innerHTML = rows.map((row, i) => {
    const tier = getTier(row);
    const extra = row.extraData;
    const rankNum = i + 1;
    let rankCls = rankNum <= 3 ? 'rank-' + rankNum : 'rank-n';
    const corePieces = row.pieceList.filter(p => p.equipmentList && p.equipmentList.length > 0);
    const mainCore = row.pieceList.find(p => p.starNum === 3) || corePieces[0];

    // Level recommendation
    const lv9 = extra.levelRate_9 || 0;
    const lv8 = extra.levelRate_8 || 0;
    const lv7 = extra.levelRate_7 || 0;
    let lvText = lv9 > 50 ? '推荐9级成型 ' + lv9.toFixed(0) + '%' :
                 lv8 > 40 ? '推荐8级成型 ' + lv8.toFixed(0) + '%' :
                 '推荐7级成型 ' + lv7.toFixed(0) + '%';

    const unitsHTML = row.pieceList.map(p => {
      const isCore = p.equipmentList && p.equipmentList.length > 0;
      const isStar = p.starNum === 3;
      let avCls = 'unit-av ' + costClass(p.price);
      if (isCore) avCls += ' core';
      if (isStar) avCls += ' star3';
      const equipHTML = isCore && p.equipmentList.length ?
        '<div class="equip-strip">' + p.equipmentList.slice(0,3).filter(e=>e.equipmentImg).map(e =>
          '<img class="equip-ic" src="' + e.equipmentImg + '" title="' + (e.equipmentName||'') + '" onerror="this.style.display='none'">'
        ).join('') + '</div>' : '';
      return '<div class="unit-wrap" onclick='showDetail(' + JSON.stringify(p) + ')'>' +
        '<div class="' + avCls + '">' +
        '<img src="' + p.img + '" alt="' + p.pieceName + '" onerror="this.src='';">' +
        costDot(p.price) +
        '</div>' +
        equipHTML +
        '<div class="unit-name' + (isCore ? ' core-name' : '') + '">' + p.pieceName + '</div>' +
        '</div>';
    }).join('');

    const campName = extra.campName ? extra.campName.replace(' && ', ' · ') : '未知阵容';

    return '<div class="lineup-card card-' + tier + '" id="card-' + row.groupId + '">' +
      '<div class="card-head">' +
        '<div class="rank-badge ' + rankCls + '">' + rankNum + '</div>' +
        '<div class="tier-tag tag-' + tier + '">' + tier + '</div>' +
        (extra.img ? '<img class="trait-img" src="' + extra.img + '" onerror="this.style.display='none'">' : '') +
        '<div class="card-title-wrap">' +
          '<div class="card-title">' + campName + '</div>' +
          '<div class="card-subtitle">' + (extra.authorName||'') + ' · ' + lvText + '</div>' +
        '</div>' +
        '<div class="card-stats">' +
          '<div class="stat"><div class="stat-v sv-win">' + row.pickRate_1 + '%</div><div class="stat-l">胜率</div></div>' +
          '<div class="stat"><div class="stat-v sv-top4">' + row.pickRate_4 + '%</div><div class="stat-l">前四率</div></div>' +
          '<div class="stat"><div class="stat-v sv-avg">' + row.avgRanking.toFixed(2) + '</div><div class="stat-l">均名次</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-body"><div class="units-row">' + unitsHTML + '</div></div>' +
      '<div class="card-foot">' +
        '<div class="level-info">' + lvText + '</div>' +
        (extra.campUrl ? '<button class="detail-btn" onclick="window.open('' + extra.campUrl + '','_blank')">查看攻略 →</button>' : '<button class="detail-btn">查看详情 →</button>') +
      '</div>' +
    '</div>';
  }).join('');
}

function filterTier(t) {
  currentTier = t;
  ['all','S','A','B','C'].forEach(x => {
    const el = document.getElementById('tier-'+x);
    if (el) el.classList.toggle('on', x === t);
  });
  applyFilter();
}

function setSort(key, label) {
  if (currentSort === key) currentAsc = !currentAsc;
  else { currentSort = key; currentAsc = key === 'avgRanking'; }
  document.querySelectorAll('.fb').forEach(b => {
    if (b.textContent.includes(label)) b.classList.add('on');
  });
  applyFilter();
}

function applyFilter() {
  let data = [...RAW];
  if (currentTier !== 'all') data = data.filter(r => getTier(r) === currentTier);
  const key = currentSort;
  data.sort((a, b) => currentAsc ? a[key] - b[key] : b[key] - a[key]);
  renderCards(data);
}

function showDetail(piece) {
  const c = 'c' + Math.min(piece.price,5);
  const isStar = piece.starNum === 3;
  let avCls = 'detail-av ' + c;
  if (isStar) avCls += ' star3';
  const equipHTML = piece.equipmentList && piece.equipmentList.length ?
    '<div class="detail-sec">' +
    '<div class="sec-lbl">推荐装备</div>' +
    '<div class="equip-list">' +
    piece.equipmentList.filter(e=>e.equipmentName).map(e =>
      '<div class="equip-row-item">' +
        (e.equipmentImg ? '<img src="' + e.equipmentImg + '" onerror="this.style.display='none'">' : '') +
        '<span>' + e.equipmentName + '</span>' +
      '</div>'
    ).join('') +
    '</div></div>' : '';

  document.getElementById('detailContent').innerHTML =
    '<div class="detail-banner">' +
      '<div class="' + avCls + '"><img src="' + piece.img + '" alt="' + piece.pieceName + '"></div>' +
      '<div><div class="detail-name">' + piece.pieceName + '</div>' +
        '<div class="detail-sub">' + piece.price + '费弈子' + (isStar ? ' · ★★★核心' : '') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="side-body">' +
      '<div class="detail-sec">' +
        '<div class="sec-lbl">基础信息</div>' +
        '<div class="stat-grid2">' +
          '<div class="sg-item"><div class="sg-val">' + piece.price + '金</div><div class="sg-lbl">费用</div></div>' +
          '<div class="sg-item"><div class="sg-val">' + (isStar ? '★★★' : '—') + '</div><div class="sg-lbl">推荐星级</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="divider"></div>' +
      equipHTML +
    '</div>';
}

function doSearch() {
  const q = document.getElementById('globalSearch').value.trim();
  if (!q) return applyFilter();
  const lower = q.toLowerCase();
  const filtered = RAW.filter(row => {
    const camp = row.extraData.campName || '';
    const pieces = row.pieceList.map(p => p.pieceName).join('');
    const equips = row.pieceList.flatMap(p => p.equipmentList.map(e => e.equipmentName||'')).join('');
    return (camp + pieces + equips).includes(q);
  });
  renderCards(filtered);
}

function sideSearchFn() {
  const q = document.getElementById('sideSearch').value.trim();
  if (!q) return applyFilter();
  document.getElementById('globalSearch').value = q;
  doSearch();
}

function setSideSearch(v) {
  document.getElementById('sideSearch').value = v;
  document.getElementById('globalSearch').value = v;
  doSearch();
}

// Initial render
applyFilter();
</script>
